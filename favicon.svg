<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#fff"/>
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#ccc" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="11" y1="4" x2="11" y2="28" stroke="#ccc" stroke-width="1.5"/>
  <line x1="21" y1="4" x2="21" y2="28" stroke="#ccc" stroke-width="1.5"/>
  <line x1="4" y1="11" x2="28" y2="11" stroke="#ccc" stroke-width="1.5"/>
  <line x1="4" y1="21" x2="28" y2="21" stroke="#ccc" stroke-width="1.5"/>
  <!-- X in top-left -->
  <line x1="5" y1="5" x2="9" y2="9" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <line x1="9" y1="5" x2="5" y2="9" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <!-- O in center -->
  <circle cx="16" cy="16" r="3" fill="none" stroke="#e53935" stroke-width="2"/>
  <!-- X in bottom-right -->
  <line x1="23" y1="23" x2="27" y2="27" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="23" x2="23" y2="27" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
</svg>
